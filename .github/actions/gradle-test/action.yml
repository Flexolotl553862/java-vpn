name: gradle-test
description: Test gradle

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 25

    - name: Grant execute permission
      run: chmod +x ./gradlew
      shell: bash

    - name: Test
      run: ./gradlew test
      shell: bash